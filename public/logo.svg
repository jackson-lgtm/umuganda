<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Three figures leaning inward toward a shared centre -->

  <!-- Left figure -->
  <circle cx="10" cy="11" r="4" fill="#e8622a"/>
  <path d="M10 17 Q10 26 18 28" stroke="#e8622a" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Right figure -->
  <circle cx="38" cy="11" r="4" fill="#f5a623"/>
  <path d="M38 17 Q38 26 30 28" stroke="#f5a623" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Centre figure (slightly forward) -->
  <circle cx="24" cy="9" r="4.5" fill="#2a1200"/>
  <path d="M24 15 L24 29" stroke="#2a1200" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Shared ground / meeting point -->
  <path d="M14 34 Q24 30 34 34" stroke="#e8622a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M10 40 Q24 34 38 40" stroke="#f5a623" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
</svg>
